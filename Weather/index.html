    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="box">

                <div class="search">
                    <input type="text" id="search" placeholder="Enter Your City...">
                     <button type="button" onclick="loadData()" id="searchBtn">🔍︎</button>
                </div>

                <div class="weather">
                    <h1 class="temp"> --°c </h1>
                    <h2 class="city">City Name</h2>
                    
<div class="information">
    <p id="admin1">State:</p>
    <p id="latitude">Latitude:</p>
    <p id="longitude">Longitude:</p>
</div>
                            <div class="details">
                                <p class="humidity"> Humidity: --% </p>
                                <p class="wind"> Wind: --km/h </p>
                            </div>
                </div>
    </div>
